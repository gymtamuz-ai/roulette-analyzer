<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#111827"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#374151" stroke-width="8"/>

  <!-- Roulette wheel sections (alternating red/black) -->
  <g transform="translate(256,256)">
    <!-- 18 red sections -->
    <path d="M0,-180 A180,180 0 0,1 56,-169 L39,-118 A125,125 0 0,0 0,-125 Z" fill="#991b1b"/>
    <path d="M56,-169 A180,180 0 0,1 103,-143 L71,-99 A125,125 0 0,0 39,-118 Z" fill="#1f2937"/>
    <path d="M103,-143 A180,180 0 0,1 143,-103 L99,-71 A125,125 0 0,0 71,-99 Z" fill="#991b1b"/>
    <path d="M143,-103 A180,180 0 0,1 169,-56 L118,-39 A125,125 0 0,0 99,-71 Z" fill="#1f2937"/>
    <path d="M169,-56 A180,180 0 0,1 180,0 L125,0 A125,125 0 0,0 118,-39 Z" fill="#991b1b"/>
    <path d="M180,0 A180,180 0 0,1 169,56 L118,39 A125,125 0 0,0 125,0 Z" fill="#1f2937"/>
    <path d="M169,56 A180,180 0 0,1 143,103 L99,71 A125,125 0 0,0 118,39 Z" fill="#991b1b"/>
    <path d="M143,103 A180,180 0 0,1 103,143 L71,99 A125,125 0 0,0 99,71 Z" fill="#1f2937"/>
    <path d="M103,143 A180,180 0 0,1 56,169 L39,118 A125,125 0 0,0 71,99 Z" fill="#991b1b"/>
    <path d="M56,169 A180,180 0 0,1 0,180 L0,125 A125,125 0 0,0 39,118 Z" fill="#1f2937"/>
    <path d="M0,180 A180,180 0 0,1 -56,169 L-39,118 A125,125 0 0,0 0,125 Z" fill="#991b1b"/>
    <path d="M-56,169 A180,180 0 0,1 -103,143 L-71,99 A125,125 0 0,0 -39,118 Z" fill="#1f2937"/>
    <path d="M-103,143 A180,180 0 0,1 -143,103 L-99,71 A125,125 0 0,0 -71,99 Z" fill="#991b1b"/>
    <path d="M-143,103 A180,180 0 0,1 -169,56 L-118,39 A125,125 0 0,0 -99,71 Z" fill="#1f2937"/>
    <path d="M-169,56 A180,180 0 0,1 -180,0 L-125,0 A125,125 0 0,0 -118,39 Z" fill="#991b1b"/>
    <path d="M-180,0 A180,180 0 0,1 -169,-56 L-118,-39 A125,125 0 0,0 -125,0 Z" fill="#1f2937"/>
    <path d="M-169,-56 A180,180 0 0,1 -143,-103 L-99,-71 A125,125 0 0,0 -118,-39 Z" fill="#991b1b"/>
    <path d="M-143,-103 A180,180 0 0,1 -103,-143 L-71,-99 A125,125 0 0,0 -99,-71 Z" fill="#1f2937"/>
    <path d="M-103,-143 A180,180 0 0,1 -56,-169 L-39,-118 A125,125 0 0,0 -71,-99 Z" fill="#991b1b"/>
    <path d="M-56,-169 A180,180 0 0,1 0,-180 L0,-125 A125,125 0 0,0 -39,-118 Z" fill="#1f2937"/>
  </g>

  <!-- Inner ring divider -->
  <circle cx="256" cy="256" r="125" fill="none" stroke="#4b5563" stroke-width="4"/>

  <!-- Green zero center -->
  <circle cx="256" cy="256" r="72" fill="#065f46"/>
  <circle cx="256" cy="256" r="68" fill="none" stroke="#6ee7b7" stroke-width="2"/>

  <!-- Zero text -->
  <text x="256" y="272" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="white">0</text>

  <!-- Outer decorative dots -->
  <circle cx="256" cy="68"  r="7" fill="#fbbf24"/>
  <circle cx="444" cy="256" r="7" fill="#fbbf24"/>
  <circle cx="256" cy="444" r="7" fill="#fbbf24"/>
  <circle cx="68"  cy="256" r="7" fill="#fbbf24"/>
</svg>
